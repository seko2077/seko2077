<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <!-- Accent gradient -->
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22D3EE"><animate attributeName="stop-color" values="#22D3EE;#A855F7;#10B981;#22D3EE" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#A855F7"><animate attributeName="stop-color" values="#A855F7;#10B981;#22D3EE;#A855F7" dur="8s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <!-- Name gradient (ASCIIText hue effect) -->
    <linearGradient id="name-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22D3EE"><animate attributeName="stop-color" values="#22D3EE;#A855F7;#22D3EE" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="50%"  stop-color="#A855F7"><animate attributeName="stop-color" values="#A855F7;#10B981;#A855F7" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#10B981"><animate attributeName="stop-color" values="#10B981;#22D3EE;#10B981" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <!-- Pill gradients -->
    <linearGradient id="pg0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#EAB308"/><stop offset="100%" stop-color="#CA8A04"/></linearGradient>
    <linearGradient id="pg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF9900"/><stop offset="100%" stop-color="#C2410C"/></linearGradient>
    <linearGradient id="pg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#0EA5E9"/></linearGradient>
    <linearGradient id="pg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4F8DC1"/><stop offset="100%" stop-color="#2C5282"/></linearGradient>
    <linearGradient id="pg4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F05032"/><stop offset="100%" stop-color="#B91C1C"/></linearGradient>
    <linearGradient id="pg5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#7E22CE"/></linearGradient>
    <linearGradient id="pg6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F472B6"/><stop offset="100%" stop-color="#DB2777"/></linearGradient>
    <linearGradient id="pg7" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    
    <!-- Radial glows -->
    <radialGradient id="g-cyn" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-prp" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <!-- Dot grid -->
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.8" fill="rgba(34,211,238,0.18)"/>
    </pattern>
    <!-- Scanlines -->
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1.5" fill="rgba(0,0,0,0.30)"/>
    </pattern>
    <!-- Wave distortion on name text (ASCIIText port) -->
    <filter id="wave" x="-5%" y="-60%" width="110%" height="220%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.12" numOctaves="2" result="n">
        <animate attributeName="baseFrequency" values="0.02 0.12;0.03 0.16;0.02 0.12" dur="5s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <!-- Left panel right-edge fade -->
    <linearGradient id="lp-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="75%" stop-color="#070D1A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#070D1A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="#040810"/>
  <rect width="1200" height="520" fill="url(#dot-grid)"/>
  <!-- Ambient orbs -->
  <ellipse cx="180" cy="260" rx="320" ry="280" fill="url(#g-cyn)" opacity="0.9">
    <animate attributeName="rx" values="320;380;320" dur="12s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1020" cy="260" rx="360" ry="260" fill="url(#g-prp)" opacity="0.8">
    <animate attributeName="rx" values="360;420;360" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Scanlines -->
  <rect width="1200" height="520" fill="url(#scan)"/>
  <!-- Sweep beam (FaultyTerminal) -->
  <rect x="0" y="-3" width="1200" height="2" fill="#22D3EE" opacity="0.05">
    <animate attributeName="y" values="-3;523;-3" dur="7s" repeatCount="indefinite"/>
  </rect>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#acc)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ── LEFT CARD ── -->
  <rect x="0" y="0" width="360" height="520" fill="#040810" opacity="0.55"/>
  <rect x="356" y="0" width="4" height="520" fill="url(#lp-fade)"/>
  <line x1="360" y1="0" x2="360" y2="520" stroke="rgba(34,211,238,0.35)" stroke-width="1.5"/>

  <!-- Name (ASCIIText port: animated gradient + wave filter) -->
  <text x="180" y="70" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="34" font-weight="900"
        fill="url(#name-g)" filter="url(#wave)">Hi, I'm Saif &#x1F44B;</text>

  <text x="180" y="106" text-anchor="middle"
        font-family="'Courier New',monospace"
        font-size="18" fill="#22D3EE" font-weight="700" letter-spacing="2"
        filter="url(#glow)">@seko2077</text>

  <text x="180" y="130" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="14" fill="#4B6080">&#127757; Earth C-137</text>

  <line x1="28" y1="150" x2="332" y2="150" stroke="rgba(34,211,238,0.35)" stroke-width="1"/>

  <!-- Stats (live — GitHub Actions updates every 6h) -->
  <g font-family="system-ui,-apple-system,sans-serif" text-anchor="middle">
    <g transform="translate(76, 168)">
      <text font-size="44" font-weight="900" fill="#22D3EE" filter="url(#glow)">3</text>
      <text y="36" font-size="13" fill="#4B6080">followers</text>
    </g>
    <g transform="translate(180, 168)">
      <text font-size="44" font-weight="900" fill="#A855F7" filter="url(#glow)">7</text>
      <text y="36" font-size="13" fill="#4B6080">following</text>
    </g>
    <g transform="translate(284, 168)">
      <text font-size="44" font-weight="900" fill="#10B981" filter="url(#glow)">4</text>
      <text y="36" font-size="13" fill="#4B6080">repos</text>
    </g>
  </g>

  <!-- Live badge -->
  <g transform="translate(115, 468)">
    <rect width="130" height="28" rx="14" fill="#040810" stroke="rgba(34,211,238,0.35)" stroke-width="1"/>
    <circle cx="18" cy="14" r="4" fill="#10B981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="68" y="18.5" text-anchor="middle" font-size="12"
          font-family="'Courier New',monospace" fill="#4B6080">live · 6h refresh</text>
  </g>

  <!-- ── RIGHT PANEL ── -->
  <g transform="translate(404, 32)">

    <!-- CardSwap phrases -->
    
    <g opacity="0" font-size="24" font-weight="800"
       font-family="'Courier New',monospace" fill="#22D3EE">
      <animateTransform attributeName="transform" type="translate"
        values="0,14;0,14;0,0;0,0;0,-14;0,-14" keyTimes="0.0000;0.0000;0.0417;0.1250;0.1667;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0"
               keyTimes="0.0000;0.0000;0.0417;0.1250;0.1667;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <text y="0">&gt;_ wabalabadubdub</text>
    </g>
    <g opacity="0" font-size="24" font-weight="800"
       font-family="'Courier New',monospace" fill="#A855F7">
      <animateTransform attributeName="transform" type="translate"
        values="0,14;0,14;0,0;0,0;0,-14;0,-14" keyTimes="0.0000;0.1667;0.2083;0.2917;0.3333;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0"
               keyTimes="0.0000;0.1667;0.2083;0.2917;0.3333;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <text y="0">&gt;_ Security Engineer</text>
    </g>
    <g opacity="0" font-size="24" font-weight="800"
       font-family="'Courier New',monospace" fill="#10B981">
      <animateTransform attributeName="transform" type="translate"
        values="0,14;0,14;0,0;0,0;0,-14;0,-14" keyTimes="0.0000;0.3333;0.3750;0.4583;0.5000;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0"
               keyTimes="0.0000;0.3333;0.3750;0.4583;0.5000;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <text y="0">&gt;_ Vibe Coder</text>
    </g>
    <g opacity="0" font-size="24" font-weight="800"
       font-family="'Courier New',monospace" fill="#FF9900">
      <animateTransform attributeName="transform" type="translate"
        values="0,14;0,14;0,0;0,0;0,-14;0,-14" keyTimes="0.0000;0.5000;0.5417;0.6250;0.6667;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0"
               keyTimes="0.0000;0.5000;0.5417;0.6250;0.6667;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <text y="0">&gt;_ Gamer</text>
    </g>
    <g opacity="0" font-size="24" font-weight="800"
       font-family="'Courier New',monospace" fill="#F05032">
      <animateTransform attributeName="transform" type="translate"
        values="0,14;0,14;0,0;0,0;0,-14;0,-14" keyTimes="0.0000;0.6667;0.7083;0.7917;0.8333;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0"
               keyTimes="0.0000;0.6667;0.7083;0.7917;0.8333;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <text y="0">&gt;_ Dressed to impress but stressed and depressed</text>
    </g>
    <g opacity="0" font-size="24" font-weight="800"
       font-family="'Courier New',monospace" fill="#EC4899">
      <animateTransform attributeName="transform" type="translate"
        values="0,14;0,14;0,0;0,0;0,-14;0,-14" keyTimes="0.0000;0.8333;0.8750;0.9583;1.0000;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0"
               keyTimes="0.0000;0.8333;0.8750;0.9583;1.0000;1.0000" dur="18.0s" repeatCount="indefinite"/>
      <text y="0">&gt;_ The more we f**k around the more we find out</text>
    </g>

    <!-- Bio -->
    <g transform="translate(0, 46)" font-size="17" fill="#4B6080"
       font-family="system-ui,-apple-system,sans-serif">
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.3s" fill="freeze"/>
        <text y="0"><tspan fill="#22D3EE" font-family="'Courier New',monospace" font-weight="700">&#9733;</tspan>
          <tspan font-weight="700" fill="#E8F4FF"> Focus: </tspan>Security Engineering &amp; Breaking Things</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
        <text y="32"><tspan fill="#A855F7" font-family="'Courier New',monospace" font-weight="700">&#9733;</tspan>
          <tspan font-weight="700" fill="#E8F4FF"> Learning: </tspan>Red-teaming, Cloud Security, CTFs</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.3s" fill="freeze"/>
        <text y="64"><tspan fill="#10B981" font-family="'Courier New',monospace" font-weight="700">&#9733;</tspan>
          <tspan font-weight="700" fill="#E8F4FF"> Off-duty: </tspan>Gaming &amp; vibing to music</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.8s" fill="freeze"/>
        <text y="96"><tspan fill="#FF9900" font-family="'Courier New',monospace" font-weight="700">&#9733;</tspan>
          <tspan font-weight="700" fill="#E8F4FF"> Bio: </tspan>Just a humble stranger &#128591;</text></g>
    </g>

    <!-- Arsenal -->
    <g transform="translate(0, 210)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="2.2s" fill="freeze"/>
      <line x1="0" y1="-6" x2="820" y2="-6" stroke="rgba(34,211,238,0.18)" stroke-width="0.8"/>
      <text font-size="13" font-weight="700" fill="#22D3EE"
            font-family="'Courier New',monospace" letter-spacing="5">ARSENAL</text>
      <g transform="translate(0, 18)">
      <g transform="translate(0,0)">
        <rect width="110" height="46" rx="9" fill="#040810" stroke="url(#pg0)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="2.2s" repeatCount="indefinite"/>
        </rect>
        <text x="55" y="29" fill="url(#pg0)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Python</text>
      </g>
      <g transform="translate(210,0)">
        <rect width="110" height="46" rx="9" fill="#040810" stroke="url(#pg1)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="2.6s" repeatCount="indefinite"/>
        </rect>
        <text x="55" y="29" fill="url(#pg1)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">AWS</text>
      </g>
      <g transform="translate(420,0)">
        <rect width="110" height="46" rx="9" fill="#040810" stroke="url(#pg2)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="2.9s" repeatCount="indefinite"/>
        </rect>
        <text x="55" y="29" fill="url(#pg2)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Docker</text>
      </g>
      <g transform="translate(0,64)">
        <rect width="148" height="46" rx="9" fill="#040810" stroke="url(#pg3)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="3.2s" repeatCount="indefinite"/>
        </rect>
        <text x="74" y="29" fill="url(#pg3)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">PostgreSQL</text>
      </g>
      <g transform="translate(210,64)">
        <rect width="110" height="46" rx="9" fill="#040810" stroke="url(#pg4)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="3.6s" repeatCount="indefinite"/>
        </rect>
        <text x="55" y="29" fill="url(#pg4)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Git</text>
      </g>
      <g transform="translate(420,64)">
        <rect width="181" height="46" rx="9" fill="#040810" stroke="url(#pg5)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="4.0s" repeatCount="indefinite"/>
        </rect>
        <text x="90" y="29" fill="url(#pg5)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Cybersecurity</text>
      </g>
      <g transform="translate(0,128)">
        <rect width="159" height="46" rx="9" fill="#040810" stroke="url(#pg6)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="4.3s" repeatCount="indefinite"/>
        </rect>
        <text x="79" y="29" fill="url(#pg6)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">3D Printing</text>
      </g>
      <g transform="translate(210,128)">
        <rect width="324" height="46" rx="9" fill="#040810" stroke="url(#pg7)" stroke-width="1.8">
          <animate attributeName="stroke-width" values="1.8;3.2;1.8" dur="4.7s" repeatCount="indefinite"/>
        </rect>
        <text x="162" y="29" fill="url(#pg7)" font-size="16" font-weight="800"
              text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">Electronics &amp; Robotics</text>
      </g></g>
    </g>

    <!-- GitHub link -->
    <g transform="translate(0, 468)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="2.8s" fill="freeze"/>
      <line x1="0" y1="0" x2="820" y2="0" stroke="rgba(34,211,238,0.35)" stroke-width="1"/>
      <g transform="translate(0, 18)" font-family="'Courier New',monospace" font-size="14">
        <circle cx="8" cy="-1" r="5" fill="#10B981" filter="url(#glow)">
          <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="22" y="0" fill="#4B6080">github.com/<tspan fill="#22D3EE" font-weight="700">seko2077</tspan></text>
      </g>
    </g>

  </g>

</svg>